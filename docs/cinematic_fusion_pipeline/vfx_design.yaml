vfx_design:
  target_style: ultra realistic cinematic VFX with dramatic emotional lighting

  fire_system:
    color_palette:
      core: '#ff6a00'
      secondary: '#ff2f00'
      highlight: '#ffd08a'
    particles:
      sparks_per_second: 220
      embers_per_second: 140
      lifetime_seconds: [0.2, 1.0]
      size_range: [0.8, 3.8]
    motion:
      swirl_frequency: 2.2
      turbulence_strength: 0.7
      upward_velocity_bias: 0.6
    distortion:
      heat_haze_strength: 0.75
      refractive_warp_radius: 0.22

  ice_system:
    color_palette:
      core: '#6ad4ff'
      secondary: '#9ff4ff'
      highlight: '#e5fbff'
    particles:
      frost_motes_per_second: 190
      crystal_fragments_per_second: 85
      lifetime_seconds: [0.35, 1.4]
      size_range: [0.7, 3.2]
    motion:
      swirl_frequency: 1.3
      turbulence_strength: 0.42
      downward_drift_bias: 0.18
    atmosphere:
      cold_mist_density: 0.68
      mist_spread: 0.34

  interaction_system:
    collision_fx:
      steam_emission_burst: 1.0
      steam_lifetime_seconds: [0.4, 1.8]
      collision_flash_strength: 0.95
      shockwave_ring_radius_growth: 2.6
      light_blend_curve: ease_in_out
    fusion_fx:
      blend_ratio_fire_to_ice: [0.5, 0.5]
      heart_shape_stabilization_time_seconds: 0.7
      pulse_frequency_hz: 1.4
      pulse_amplitude: 0.24

  lighting_behavior:
    fire_light:
      hue: warm_orange
      intensity_range: [1.1, 2.8]
      flicker_speed: 8.0
    ice_light:
      hue: cool_cyan
      intensity_range: [0.9, 2.1]
      flicker_speed: 3.4
    lightning_or_fusion_peak:
      hue: white_blue
      intensity_peak: 3.2
      peak_duration_seconds: 0.14

  compositing_notes:
    bloom:
      threshold: 0.05
      strength: [0.95, 1.8]
      radius: 0.55
    chromatic_aberration:
      base_amount: 0.0012
      collision_amount: 0.003
    volumetric:
      fog_height_falloff: 0.28
      godray_visibility: high during stages 3 and 4
